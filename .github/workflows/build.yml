name: Build APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '9.3.1'
        
    - name: Generate gradlew if missing
      run: |
        if [ ! -f gradlew ]; then
          echo "gradlew not found, generating..."
          gradle wrapper --gradle-version 9.3.1
        fi
        chmod +x gradlew
        
    - name: Build Debug APK (skip tests)
      run: ./gradlew assembleDebug --no-daemon -x test -x lint -x lintVitalRelease
      
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
