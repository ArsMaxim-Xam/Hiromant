name: Build Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # Позволяет запускать сборку вручную одной кнопкой в GitHub!

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleDebug

    - name: Upload ARM64 APK
      uses: actions/upload-artifact@v4
      with:
        name: app-arm64-v8a-debug-apk
        path: app/build/outputs/apk/debug/app-arm64-v8a-debug.apk

    - name: Upload ARMEABI APK
      uses: actions/upload-artifact@v4
      with:
        name: app-armeabi-v7a-debug-apk
        path: app/build/outputs/apk/debug/app-armeabi-v7a-debug.apk

    - name: Upload X86 APK
      uses: actions/upload-artifact@v4
      with:
        name: app-x86-debug-apk
        path: app/build/outputs/apk/debug/app-x86-debug.apk

    - name: Upload X86_64 APK
      uses: actions/upload-artifact@v4
      with:
        name: app-x86_64-debug-apk
        path: app/build/outputs/apk/debug/app-x86_64-debug.apk

    - name: Upload Universal APK
      uses: actions/upload-artifact@v4
      with:
        name: app-universal-debug-apk
        path: app/build/outputs/apk/debug/app-universal-debug.apk
